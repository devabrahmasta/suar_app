name: Sync Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # Only trigger when changes are made inside backend/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history is required for git subtree split

      - name: Push Subdirectory to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git credentials
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          # Split the 'backend' folder into a temporary branch where 'backend' contents become the root
          git subtree split --prefix=backend --branch=hf-release

          # Force push the hf-release branch to Hugging Face main branch
          # Replace 'lintangnv' and 'suar-backend' with your actual HF username and Space name
          git push -f https://lintangnv:$HF_TOKEN@huggingface.co/spaces/lintangnv/suar-backend hf-release:refs/heads/main
